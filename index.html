<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>랜덤 말 생성기</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 100px;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
    }
    #result {
      margin-top: 30px;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>랜덤 말 생성기</h1>
  <button onclick="generate()">말 생성하기</button>

  <div id="result"></div>

  <script>
    const words = [
      "걸레",
      "멘헤라",
      "처녀막",
      "소추",
      "피 싸다",
      "섹스"
    ];

    function generate() {
      let shuffled = [...words].sort(() => Math.random() - 0.5);
      let count = Math.floor(Math.random() * 5) + 2; // 2~6개
      let selected = shuffled.slice(0, count);
      document.getElementById("result").innerText = selected.join(" ");
    }
  </script>

</body>
</html>
